<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Memoria - Clooney</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Font: Pacifico & Fredoka -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka:wght@500;600;700&display=swap" rel="stylesheet">

  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-idle d-flex flex-column align-items-center justify-content-start min-vh-100 p-2 p-sm-3">

  <header class="header-container text-center my-1 my-sm-2 w-100 d-flex flex-column align-items-center">
    
    <!-- Título Principal (3 líneas apiladas) -->
    <h1 class="main-title text-center my-1">
      <span class="title-line line-1">Juego de Memoria</span>
      <span class="title-line line-2">de</span>
      <span class="title-line line-3">Clooney</span>
    </h1>

    <!-- Panel de Controles / Marcador -->
    <div class="controls-panel d-inline-flex flex-wrap align-items-center justify-content-center gap-2 gap-sm-4 p-2 p-sm-3 rounded-4 shadow mt-2">
      <div class="score-board d-flex gap-3 fs-6 fs-sm-5 fw-semibold text-white">
        <p class="m-0">Movimientos: <span id="moves" class="badge bg-primary ms-1">0</span></p>
        <p class="m-0">Parejas: <span id="matches" class="badge bg-success ms-1">0/6</span></p>
      </div>
      
      <button id="restart-btn" class="btn btn-success btn-sm btn-sm-lg fw-bold d-flex align-items-center gap-1 gap-sm-2 shadow-sm py-1 px-2 px-sm-3">
        <img src="images/icono_boton.png" alt="Boton" class="custom-icon-sm">
        <span id="btn-text">Repartir Cartas</span>
      </button>
    </div>

  </header>

  <!-- Contenedor Principal de Cartas -->
  <main class="container my-1 my-sm-2 px-1 px-sm-3">
    <div id="grid-container" class="row row-cols-3 row-cols-sm-4 row-cols-lg-6 g-2 g-sm-3 justify-content-center">
      <!-- Cartas generadas dinámicamente -->
    </div>
  </main>

  <!-- Cartel de Victoria Difuminado -->
  <div id="victory-modal" class="modal-overlay hidden">
    <div class="modal-content-custom text-center p-4 rounded-4 shadow-lg">
      <img src="images/icono_victoria.png" alt="Victoria" class="custom-icon-lg mb-2">
      <h2 class="fw-bold mb-2 modal-title-text">¡Has ganado!!</h2>
      <p class="modal-body-text mb-4">¡Lograste encontrar todas las parejas de Clooney!</p>
      <button id="play-again-btn" class="btn btn-success btn-lg px-4 fw-bold shadow">Jugar de nuevo</button>
    </div>
  </div>

  <!-- CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
