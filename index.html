<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juego de Memoria</title>
  
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <!-- Google Fonts: Chango (Primer texto) y Nunito Sans (Segundo texto, botones y demás) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chango&family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&display=swap" rel="stylesheet">

  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="style.css">
</head>
<body class="game-idle d-flex flex-column align-items-center justify-content-between min-vh-100 p-2 p-sm-3">

<!-- Encabezado / Título Principal -->
<header class="header-container text-center my-2 w-100">
  <h1 class="main-title text-center my-1">
    <span class="title-line line-1">Juego de Memoria</span>
    <span class="title-line line-2">Encuentra las parejas</span>
  </h1>
</header>

  <!-- Contenedor Principal de Cartas -->
  <main class="container my-auto px-1 px-sm-3">
    <div id="grid-container" class="row row-cols-3 row-cols-sm-4 row-cols-lg-6 g-2 g-sm-3 justify-content-center">
      <!-- Cartas generadas dinámicamente -->
    </div>
  </main>

  <!-- Panel de Controles / Marcador (Ubicado Abajo) -->
  <footer class="footer-controls text-center mb-2 w-100 d-flex flex-column align-items-center gap-2">
    <div class="controls-panel d-inline-flex flex-column align-items-center justify-content-center gap-2 p-2 p-sm-3 rounded-4 shadow">
      
      <!-- Fila 1: Marcadores + Reloj (Oculto por defecto con d-none) -->
      <div class="score-board d-flex align-items-center justify-content-center gap-2 gap-sm-3 fs-6 fs-sm-5 fw-semibold text-white">
        <p class="m-0">Movimientos: <span id="moves" class="badge badge-neon ms-1">0</span></p>
        <p class="m-0">Parejas: <span id="matches" class="badge badge-neon ms-1">0/6</span></p>

        <!-- El reloj ahora está en la misma fila y nace oculto -->
        <div id="timerContainer" class="timer-badge d-none ms-1">
          ⏱️ <span id="timerDisplay">00:00</span>
        </div>
      </div>

      <!-- NUEVO DESPLEGABLE CON BORDES REDONDEADOS -->
<div id="modeSelectorContainer" class="mode-selector-container d-flex align-items-center gap-2 my-1">
  <label class="text-light mb-0 fw-semibold" style="font-size: 0.85rem;">Modo:</label>
  <div class="dropdown custom-mode-dropdown">
    <button class="btn glass-select-btn dropdown-toggle" type="button" id="gameModeBtn" data-bs-toggle="dropdown" aria-expanded="false">
      Libre
    </button>
    <ul class="dropdown-menu glass-dropdown-menu text-center">
      <li><a class="dropdown-item active" href="#" data-value="libre">Libre</a></li>
      <li><a class="dropdown-item" href="#" data-value="cronometro">Crono</a></li>
    </ul>
  </div>

  <!-- BOTÓN PARA VER RANKING DESDE LA PORTADA -->
  <button id="btn-ver-ranking" class="btn glass-select-btn" type="button">
    🏆 Ranking
  </button>
</div>

      <!-- Fila 3: Botón Iniciar -->
      <button id="restart-btn" class="btn btn-neon py-2 px-3 px-sm-4">
        <span id="btn-text">Iniciar Juego</span>
      </button>

    </div>

    <!-- Firma de la autora / Créditos -->
    <div class="credits-signature mt-1">
      <span>Creado con ❤️ por <a href="https://github.com/eugeniacoarasa/juego_memoria" target="_blank" rel="noopener noreferrer" class="author-link">Eugenia Coarasa</a></span>
    </div>
  </footer>

  <!-- Cartel de Victoria y Ranking Top 5 -->
  <div id="victory-modal" class="modal-overlay hidden">
    <div class="modal-content-custom text-center p-4 rounded-4 shadow-lg">
      <img src="images/icono_victoria.png" alt="Victoria" class="custom-icon-lg mb-2">
      <h2 class="fw-bold mb-1 modal-title-text">¡Has ganado!</h2>

      <!-- Puntuación Obtenida -->
      <div class="my-2">
        <p class="m-0 text-light small">Tu puntuación:</p>
        <span id="finalScoreDisplay" class="fs-2 fw-bold text-neon-green">0 pts</span>
      </div>

      <!-- Registro de Iniciales -->
      <div id="scoreSaveContainer" class="mb-3 d-flex flex-column align-items-center gap-2">
        <input type="text" id="playerNameInput" class="form-control text-center glass-input text-uppercase" placeholder="EJ. EUG" maxlength="3" autocomplete="off">
        <button id="saveScoreBtn" class="btn btn-sm btn-neon">Guardar en Ranking</button>
      </div>

      <!-- Tabla Top 5 Mejores Puntajes -->
      <div class="leaderboard-container p-2 rounded-3 text-start">
        <h6 class="fw-bold text-uppercase text-center text-light mb-2" style="font-size: 0.8rem; letter-spacing: 1px;">🏆 Top 5 Récords</h6>
        <ol id="leaderboardList" class="list-unstyled m-0 p-0 small text-light"></ol>
      </div>

      <button id="play-again-btn" class="btn btn-neon px-4 py-2 mt-3">¿Jugar de nuevo?</button>
    </div>
  </div>

  <!-- CDNs -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
  <script src="script.js"></script>
</body>
</html>
